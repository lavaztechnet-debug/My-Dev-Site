<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroStack - Notes</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <div class="bg-orb orb-a"></div><div class="bg-orb orb-b"></div>
  <main class="shell">
    <aside class="sidebar neu-panel">
      <div class="brand neu-inset"><div class="brand-mark">N</div><div><h1>NeuroStack</h1><p>Notes</p></div></div>
      <nav class="nav"><a class="nav-btn" href="index.html">Home</a><a class="nav-btn active" href="notes.html">Notes</a><a class="nav-btn" href="gemini.html">Gemini Helper</a><a class="nav-btn" href="prompts.html">Prompt Lab</a></nav>
      <section class="sidebar-card neu-panel"><h3>Stored Data</h3><p id="statsText">0 notes saved</p></section>
    </aside>
    <section class="content">
      <header class="topbar neu-panel">
        <div><h2 id="pageTitle">Notes</h2><p id="pageSubtitle">Store notes locally with search, edit, and export.</p></div>
        <div class="topbar-actions"><a class="neu-btn" href="index.html">Home</a><button id="themeToggle" class="neu-btn" type="button">🌙 Dark</button><button id="clearAllData" class="neu-btn danger-btn" type="button">Clear App Data</button></div>
      </header>
      <section class="grid two page-grid">
        <article class="neu-panel depth-lg"><h3>Write Note</h3><form id="noteForm" class="stack"><input id="noteTitle" class="neu-input" type="text" placeholder="Note title" maxlength="120" required /><textarea id="noteBody" class="neu-input area-lg" placeholder="Write your note..." required></textarea><div class="row"><button type="submit" class="neu-btn primary-btn">Save Note</button><button type="button" id="resetNote" class="neu-btn">Reset</button><button type="button" id="exportNotes" class="neu-btn">Export JSON</button></div><input type="hidden" id="editingNoteId" /></form></article>
        <article class="neu-panel depth-lg"><h3>Find Notes</h3><input id="searchNotes" class="neu-input" type="text" placeholder="Search title or content" /><div id="notesList" class="notes-list"></div></article>
      </section>
    </section>
  </main>
</body>
</html>
