<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroStack - Gemini Helper</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="gemini.js" defer></script>
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <main class="shell shell-feature">
    <aside class="sidebar neu-panel">
      <div class="brand neu-inset">
        <div class="brand-mark">N</div>
        <div>
          <h1>NeuroStack</h1>
          <p>Gemini Helper</p>
        </div>
      </div>

      <nav class="nav">
        <a class="nav-btn" href="index.html">Home</a>
        <a class="nav-btn" href="notes.html">Notes</a>
        <a class="nav-btn active" href="gemini.html">Gemini Helper</a>
        <a class="nav-btn" href="prompts.html">Prompt Lab</a>
      </nav>

      <section class="sidebar-card neu-panel">
        <h3>Secure Setup</h3>
        <p>Save your Gemini key locally and run prompts from this dedicated page.</p>
      </section>
    </aside>

    <section class="content">
      <header class="topbar neu-panel">
        <div>
          <h2>Gemini Helper</h2>
          <p>Use your own API key and model from a single clean panel.</p>
        </div>
        <div class="topbar-actions">
          <a class="neu-btn" href="index.html">Home</a>
          <button id="themeToggle" class="neu-btn" aria-label="Toggle dark mode" type="button">🌙 Dark</button>
          <button id="clearAllData" class="neu-btn danger-btn" type="button">Clear App Data</button>
        </div>
      </header>

      <section class="grid two page-grid">
        <article class="neu-panel depth-lg">
          <h3>Gemini Setup</h3>
          <div class="stack">
            <input id="geminiApiKey" class="neu-input" type="password" placeholder="Paste Gemini API key" />
            <input id="geminiModel" class="neu-input" type="text" placeholder="Enter Gemini model name" />
            <textarea id="geminiSystem" class="neu-input area-md" placeholder="System instructions"></textarea>
            <textarea id="geminiPrompt" class="neu-input area-lg" placeholder="Ask Gemini anything..."></textarea>
            <div class="row">
              <button id="runGemini" class="neu-btn primary-btn" type="button">Run Gemini</button>
              <button id="saveGeminiSettings" class="neu-btn" type="button">Save Settings</button>
              <button id="clearGeminiOutput" class="neu-btn" type="button">Clear Output</button>
            </div>
          </div>
        </article>

        <article class="neu-panel depth-lg">
          <h3>Gemini Output</h3>
          <div id="geminiStatus" class="status-pill">Idle</div>
          <pre id="geminiOutput" class="output-box">Response will appear here.</pre>
        </article>
      </section>
    </section>
  </main>
</body>
</html>
