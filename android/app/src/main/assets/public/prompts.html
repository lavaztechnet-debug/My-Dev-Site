<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroStack - Prompt Lab</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <div class="bg-orb orb-a"></div><div class="bg-orb orb-b"></div>
  <main class="shell">
    <aside class="sidebar neu-panel">
      <div class="brand neu-inset"><div class="brand-mark">N</div><div><h1>NeuroStack</h1><p>Prompt Lab</p></div></div>
      <nav class="nav"><a class="nav-btn" href="index.html">Home</a><a class="nav-btn" href="notes.html">Notes</a><a class="nav-btn" href="gemini.html">Gemini Helper</a><a class="nav-btn active" href="prompts.html">Prompt Lab</a></nav>
      <section class="sidebar-card neu-panel"><h3>Fast Creation</h3><p>Build structured prompts in a clean dedicated page.</p></section>
    </aside>
    <section class="content">
      <header class="topbar neu-panel">
        <div><h2>Prompt Lab</h2><p>Compose structured prompts for better AI output.</p></div>
        <div class="topbar-actions"><a class="neu-btn" href="index.html">Home</a><button id="themeToggle" class="neu-btn" type="button">🌙 Dark</button><button id="clearAllData" class="neu-btn danger-btn" type="button">Clear App Data</button></div>
      </header>
      <section class="grid two page-grid">
        <article class="neu-panel depth-lg"><h3>Prompt Builder</h3><div class="stack"><input id="pbRole" class="neu-input" type="text" placeholder="Role, e.g. Senior product strategist" /><input id="pbGoal" class="neu-input" type="text" placeholder="Goal" /><input id="pbAudience" class="neu-input" type="text" placeholder="Audience" /><input id="pbTone" class="neu-input" type="text" placeholder="Tone" /><textarea id="pbContext" class="neu-input area-sm" placeholder="Context"></textarea><textarea id="pbConstraints" class="neu-input area-sm" placeholder="Constraints"></textarea><textarea id="pbFormat" class="neu-input area-sm" placeholder="Desired output format"></textarea><div class="row"><button id="buildPrompt" class="neu-btn primary-btn" type="button">Generate Prompt</button><button id="copyPrompt" class="neu-btn" type="button">Copy</button><button id="clearPrompt" class="neu-btn" type="button">Clear</button></div></div></article>
        <article class="neu-panel depth-lg"><h3>Generated Prompt</h3><textarea id="promptOutput" class="neu-input area-xl" placeholder="Your generated prompt will appear here."></textarea></article>
      </section>
    </section>
  </main>
</body>
</html>
